<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Lernspiel: Dialog-Puzzle Laden</title>
    <!-- Einbindung der SortableJS Bibliothek für flüssiges Drag & Drop -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #16a085;
            --success-color: #27ae60;
            --error-color: #c0392b;
            --bg-color: #f2f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 1.4rem;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 10px;
        }

        .instruction {
            background: #e8f8f5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            line-height: 1.4;
            border-left: 4px solid var(--accent-color);
        }

        #dialog-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .dialog-item {
            background: #fff;
            border: 2px solid #ddd;
            margin-bottom: 8px;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: grab;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            user-select: none;
            touch-action: manipulation;
            display: flex;
            align-items: center;
        }

        .dialog-item:active { cursor: grabbing; }

        .dialog-item.correct {
            border-color: var(--success-color);
            background-color: #eafaf1;
        }

        .dialog-item.wrong {
            border-color: var(--error-color);
            background-color: #fdedec;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 20px;
            font-size: 0.95rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
            min-width: 130px;
        }

        #check-btn { background-color: var(--primary-color); color: white; }
        #solution-btn { background-color: #f39c12; color: white; }
        #reset-btn { background-color: #95a5a6; color: white; }

        button:hover { opacity: 0.9; }

        #feedback {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            min-height: 24px;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.2rem; }
            .dialog-item { font-size: 0.85rem; padding: 8px; }
            button { flex: 1 1 45%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Dialog-Puzzle: Im Geschäft</h1>
    
    <div class="instruction">
        <strong>Aufgabe:</strong> Bringe das Gespräch beim Händler in die richtige Reihenfolge. Schiebe die Kacheln an die richtige Stelle.
    </div>

    <ul id="dialog-list">
        <!-- Inhalte werden per JS geladen -->
    </ul>

    <div id="feedback"></div>

    <div class="controls">
        <button id="check-btn">Prüfen</button>
        <button id="solution-btn">Lösung anzeigen</button>
        <button id="reset-btn">Neu mischen</button>
    </div>
</div>

<script>
    // Der Dialog in korrekter Abfolge (Blöcke zur besseren Übersicht)
    const correctOrder = [
        "Здравствуйте! – Здравствуйте.",
        "Сколько стоит чай Липтон? – Семьдесят пять. Вам один?",
        "Да. И еще тот батон.",
        "С вас девяносто три рубля. Что-то еще?",
        "Да. Творог у вас свежий? – Утром привезли.",
        "Давайте грамм триста.",
        "На двести пятьдесят рублей пойдет? – Да. Это всё.",
        "Триста сорок три рубля. Пожалуйста.",
        "Без сдачи не будет? – Нет, к сожалению.",
        "Ваша сдача – пятьдесят семь рублей.",
        "Спасибо. До свидания. – До свидания."
    ];

    const dialogList = document.getElementById('dialog-list');
    const feedback = document.getElementById('feedback');
    const checkBtn = document.getElementById('check-btn');
    const resetBtn = document.getElementById('reset-btn');
    const solutionBtn = document.getElementById('solution-btn');

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function initGame() {
        dialogList.innerHTML = '';
        feedback.innerText = '';
        const shuffled = shuffle([...correctOrder]);
        shuffled.forEach(text => {
            const li = document.createElement('li');
            li.className = 'dialog-item';
            li.innerText = text;
            dialogList.appendChild(li);
        });
    }

    new Sortable(dialogList, {
        animation: 150,
        ghostClass: 'sortable-ghost',
        onStart: () => {
            document.querySelectorAll('.dialog-item').forEach(el => {
                el.classList.remove('correct', 'wrong');
            });
            feedback.innerText = '';
        }
    });

    checkBtn.addEventListener('click', () => {
        const currentItems = document.querySelectorAll('.dialog-item');
        let correctCount = 0;
        currentItems.forEach((item, index) => {
            if (item.innerText === correctOrder[index]) {
                item.classList.add('correct');
                correctCount++;
            } else {
                item.classList.add('wrong');
            }
        });

        if (correctCount === correctOrder.length) {
            feedback.innerText = "Hervorragend! Der Ablauf im Laden ist korrekt.";
            feedback.style.color = "var(--success-color)";
        } else {
            feedback.innerText = "Noch nicht ganz richtig. Überprüfe die markierten Stellen.";
            feedback.style.color = "var(--error-color)";
        }
    });

    solutionBtn.addEventListener('click', () => {
        dialogList.innerHTML = '';
        correctOrder.forEach(text => {
            const li = document.createElement('li');
            li.className = 'dialog-item correct';
            li.innerText = text;
            dialogList.appendChild(li);
        });
        feedback.innerText = "Hier ist die richtige Reihenfolge angezeigt.";
        feedback.style.color = "#f39c12";
    });

    resetBtn.addEventListener('click', initGame);

    initGame();
</script>

</body>
</html>
