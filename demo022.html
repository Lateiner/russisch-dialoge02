<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Lernspiel: Dieser oder Jener?</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            color: var(--primary-color);
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        h1 { font-size: 1.4rem; margin-top: 0; }

        .instruction {
            font-size: 0.95rem;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        /* Die Szene */
        .scene {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
            border: 2px solid #eee;
        }

        .hand { font-size: 3rem; }
        .distance { flex-grow: 1; border-bottom: 2px dashed #bdc3c7; margin: 0 20px; position: relative; display: none; }
        .distance.active { display: block; }
        .product { font-size: 3.5rem; }
        .short-gap { width: 15px; display: block; }

        .phrase-box {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 25px;
            color: var(--primary-color);
        }

        .placeholder {
            color: var(--accent-color);
            border-bottom: 3px solid var(--accent-color);
            padding: 0 10px;
            min-width: 80px;
            display: inline-block;
        }

        /* Antwort-Optionen */
        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background: white;
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent-color);
            background-color: #fffaf0;
        }

        .option-btn.correct {
            background-color: #e8f5e9;
            border-color: var(--success-color);
            color: #2e7d32;
        }

        .option-btn.wrong {
            background-color: #ffebee;
            border-color: var(--error-color);
            color: #c62828;
        }

        #feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }

        .next-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            margin-top: 20px;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }

        #result-screen { display: none; }
        .score-val { font-size: 3rem; font-weight: bold; color: var(--accent-color); }

        @media (max-width: 480px) {
            .scene { padding: 15px; }
            .product { font-size: 2.5rem; }
            .option-btn { padding: 12px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-screen">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <h1>Nah oder weit weg?</h1>
        <div class="instruction">
            Wähle das richtige Wort: <br>
            Nah beim Kunden = <b>этот / эта</b> <br>
            Weit weg (dort drüben) = <b>тот / та</b>
        </div>

        <div class="scene">
            <span class="hand">👈</span>
            <div id="gap-far" class="distance"></div>
            <div id="gap-near" class="short-gap"></div>
            <span id="product-emoji" class="product">🥖</span>
        </div>

        <div class="phrase-box">
            <span id="word-display" class="placeholder">...</span> <span id="item-name">батон</span>
        </div>

        <div id="options" class="options-container"></div>

        <div id="feedback"></div>
        <button id="next-btn" class="next-btn" onclick="nextQuestion()">Nächste Aufgabe</button>
    </div>

    <div id="result-screen">
        <h1>Übung beendet!</h1>
        <div class="score-val" id="final-score">0 / 10</div>
        <p id="comment"></p>
        <button onclick="location.reload()" style="padding:15px; background:var(--accent-color); color:white; border:none; border-radius:10px; cursor:pointer; width:100%; font-weight:bold;">Neu starten</button>
    </div>
</div>

<script>
    const questions = [
        { emoji: "🥖", name: "батон", distance: "far", options: ["этот", "тот"], correct: 1, gender: "m" },
        { emoji: "☕", name: "чай", distance: "near", options: ["этоt", "тот"], correct: 0, gender: "m" },
        { emoji: "🛍️", name: "пачка", distance: "far", options: ["эта", "та"], correct: 1, gender: "f" },
        { emoji: "🥛", name: "творог", distance: "near", options: ["этот", "тот"], correct: 0, gender: "m" },
        { emoji: "🥖", name: "батон", distance: "near", options: ["этот", "тот"], correct: 0, gender: "m" },
        { emoji: "🛍️", name: "пачка", distance: "near", options: ["эта", "та"], correct: 0, gender: "f" },
        { emoji: "☕", name: "чай", distance: "far", options: ["этот", "тот"], correct: 1, gender: "m" },
        { emoji: "🪙", name: "сдача", distance: "far", options: ["эта", "та"], correct: 1, gender: "f" },
        { emoji: "🥛", name: "творог", distance: "far", options: ["этот", "тот"], correct: 1, gender: "m" },
        { emoji: "🪙", name: "сдача", distance: "near", options: ["эта", "та"], correct: 0, gender: "f" }
    ];

    let currentIdx = 0;
    let score = 0;

    const productEmoji = document.getElementById('product-emoji');
    const itemName = document.getElementById('item-name');
    const gapFar = document.getElementById('gap-far');
    const gapNear = document.getElementById('gap-near');
    const optionsContainer = document.getElementById('options');
    const wordDisplay = document.getElementById('word-display');
    const feedbackEl = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const progressFill = document.getElementById('progress-fill');

    function loadQuestion() {
        const q = questions[currentIdx];
        productEmoji.innerText = q.emoji;
        itemName.innerText = q.name;
        wordDisplay.innerText = "...";
        feedbackEl.style.display = 'none';
        nextBtn.style.display = 'none';

        if (q.distance === "far") {
            gapFar.classList.add('active');
            gapNear.style.display = 'none';
        } else {
            gapFar.classList.remove('active');
            gapNear.style.display = 'block';
        }

        optionsContainer.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, btn);
            optionsContainer.appendChild(btn);
        });

        progressFill.style.width = `${(currentIdx / questions.length) * 100}%`;
    }

    function checkAnswer(selectedIdx, btn) {
        const q = questions[currentIdx];
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);

        if (selectedIdx === q.correct) {
            btn.classList.add('correct');
            score++;
            showFeedback(true);
        } else {
            btn.classList.add('wrong');
            allBtns[q.correct].classList.add('correct');
            showFeedback(false);
        }

        wordDisplay.innerText = q.options[q.correct];
        nextBtn.style.display = 'block';
    }

    function showFeedback(isCorrect) {
        feedbackEl.style.display = 'block';
        if (isCorrect) {
            feedbackEl.innerText = "Richtig!";
            feedbackEl.style.backgroundColor = "#e8f5e9";
            feedbackEl.style.color = "#2e7d32";
        } else {
            feedbackEl.innerText = "Nicht ganz.";
            feedbackEl.style.backgroundColor = "#ffebee";
            feedbackEl.style.color = "#c62828";
        }
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        progressFill.style.width = '100%';
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `${score} / 10`;
        
        const comment = document.getElementById('comment');
        if (score === 10) comment.innerText = "Perfekt! Du hast den Unterschied zwischen nah und fern verstanden.";
        else if (score >= 7) comment.innerText = "Sehr gut! Du kennst die Demonstrativpronomen.";
        else comment.innerText = "Übe am besten noch einmal den Unterschied zwischen nah und fern.";
    }

    loadQuestion();
</script>

</body>
</html>
